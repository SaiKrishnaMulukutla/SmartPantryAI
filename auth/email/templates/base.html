<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SmartPantryAI</title>
</head>
<body style="margin:0;padding:0;background:#F4F5F0;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F4F5F0;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="580" cellpadding="0" cellspacing="0" style="max-width:580px;width:100%;">

          <!-- Header -->
          <tr>
            <td align="center" style="background:#2D6A4F;border-radius:12px 12px 0 0;padding:32px 40px;">
              <span style="font-size:28px;">🍳</span>
              <h1 style="margin:8px 0 0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">
                SmartPantryAI
              </h1>
              <p style="margin:4px 0 0;color:#B7D8C9;font-size:13px;letter-spacing:0.5px;">
                AI-Powered Recipe Recommendations
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px;border-left:1px solid #E8EAE5;border-right:1px solid #E8EAE5;">
              $body
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#F9FAF7;border:1px solid #E8EAE5;border-top:none;border-radius:0 0 12px 12px;padding:24px 40px;text-align:center;">
              <p style="margin:0;color:#9CA3AF;font-size:12px;line-height:1.6;">
                This email was sent by SmartPantryAI. If you didn't request this, you can safely ignore it.
              </p>
              <p style="margin:8px 0 0;color:#9CA3AF;font-size:12px;">
                &copy; 2025 SmartPantryAI &nbsp;·&nbsp; Made with 🍃 for food lovers
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
